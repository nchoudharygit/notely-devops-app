global:
  scrape_interval: 15s
  evaluation_interval: 15s
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
rule_files:
  - '/etc/prometheus/alerts.yml'
scrape_configs:
  - job_name: 'notely-app'
    static_configs:
      - targets: ['notely-app:80']
    metrics_path: '/metrics'
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']