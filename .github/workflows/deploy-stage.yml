name: Deploy - ECS Force Deployment
on:
  push:
    branches:
      - feature/force-deploy

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::162185499985:role/GitHubActions-notely-devops-app-deploy
          aws-region: ap-south-1


      - name: Force deploy to ECS      
        run: |
          aws ecs update-service \
            --cluster notely-cluster-staging \
            --service notely-service-staging \
            --force-new-deployment \
            --region ap-south-1

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster notely-cluster-staging \
            --services notely-service-staging \
            --region ap-south-1