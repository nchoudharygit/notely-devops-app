name: Infrastructure Setup - Terraform Apply/Destroy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose the action to perform'
        required: true
        type: choice
        default: 'apply'
        options:
          - apply
          - destroy
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.13.0
      

      - name: Initialize Terraform
        working-directory: ./terraform
        run: terraform init

      - name: Fetch DB Password
        id: secrets
        run: |
          DB_PWD=$(aws secretsmanager get-secret-value \
            --secret-id notely/staging/db-password \
            --query SecretString --output text)
          echo "::add-mask::$DB_PWD"
          echo "db_pwd=$DB_PWD" >> $GITHUB_OUTPUT

      - name: Fetch Grafana Password
        id: secret-grafana
        run: |
          GRAFANA_PWD=$(aws secretsmanager get-secret-value \
            --secret-id notely/staging/grafana-password \
            --query SecretString --output text)
          echo "::add-mask::$GRAFANA_PWD"
          echo "grafana_pwd=$GRAFANA_PWD" >> $GITHUB_OUTPUT
          
      - name: Plan Terraform changes
        working-directory: ./terraform
        run: |
          terraform plan \
            -var='db_password=${{ steps.secrets.outputs.db_pwd }}' \
            -var='grafana_password=${{ steps.secret-grafana.outputs.grafana_pwd }}'
     

      - name: Apply or Destroy Terraform
        working-directory: ./terraform
        run: |
          if [ "${{ github.event.inputs.action }}" == "apply" ]; then
            terraform apply \
            -var='db_password=${{ steps.secrets.outputs.db_pwd }}' \
            -var='grafana_password=${{ steps.secret-grafana.outputs.grafana_pwd }}' \
            -auto-approve
          elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform destroy \
            -var='db_password=${{ steps.secrets.outputs.db_pwd }}' \
            -var='grafana_password=${{ steps.secret-grafana.outputs.grafana_pwd }}' \
            -auto-approve
          else
            echo "Invalid action. Please choose 'apply' or 'destroy'."
            exit 1
          fi