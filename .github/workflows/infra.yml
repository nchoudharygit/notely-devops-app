name: Infrastructure Setup - Terraform Apply/Destroy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose the action to perform'
        required: true
        type: choice
        default: 'apply'
        options:
          - apply
          - destroy
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.0.0
      

      - name: Initialize Terraform
        working-directory: ./terraform
        run: terraform init

      - name: Plan Terraform changes
        working-directory: ./terraform
        run: terraform plan

      - name: Apply or Destroy Terraform
        working-directory: ./terraform
        run: |
          if [ "${{ github.event.inputs.action }}" == "apply" ]; then
            terraform apply \
            -var='db_password=${{ secrets.DB_PASSWORD }}' \
            -var='grafana_password=${{ secrets.GRAFANA_PASSWORD }}' \
            -auto-approve
          elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform destroy \
            -var='db_password=${{ secrets.DB_PASSWORD }}' \
            -var='grafana_password=${{ secrets.GRAFANA_PASSWORD }}' \
            -auto-approve
          else
            echo "Invalid action. Please choose 'apply' or 'destroy'."
            exit 1
          fi