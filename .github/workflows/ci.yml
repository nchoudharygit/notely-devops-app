name: CI - Build and Test
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push PHP image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/notely-app:${{ github.sha }} ./app/backend
          docker push ${{ secrets.ECR_REGISTRY }}/notely-app:${{ github.sha }}

      - name: Build and push Nginx image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/notely-nginx:${{ github.sha }} ./app/nginx
          docker push ${{ secrets.ECR_REGISTRY }}/notely-nginx:${{ github.sha }}
